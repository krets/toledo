<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6b9ce8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TOleDO">
<title>TOleDO</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0d0d0d;
  --surface:   #1a1a1a;
  --surface2:  #242424;
  --surface3:  #2e2e2e;
  --accent:    #6b9ce8;
  --accent-dim:rgba(107,156,232,0.15);
  --danger:    #e74c3c;
  --warning:   #f0a500;
  --success:   #2ecc71;
  --text:      #e8e8e8;
  --muted:     #777;
  --border:    #2a2a2a;
  --r:         8px;
  --top:       52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.5}

/* ── Topbar ── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:var(--top);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 10px 0 14px;z-index:100;gap:8px;
}
.back-btn{
  background:none;border:none;color:var(--accent);cursor:pointer;
  font-size:22px;line-height:1;padding:4px 6px 4px 0;flex-shrink:0;
}
.brand{
  flex:1;font-family:'Playfair Display',Georgia,'Times New Roman',serif;
  font-size:20px;font-weight:700;color:var(--accent);letter-spacing:-.2px;
  user-select:none;
}
#ham-btn{
  background:none;border:none;color:var(--text);cursor:pointer;
  padding:7px;border-radius:6px;flex-shrink:0;transition:background .15s;
}
#ham-btn:hover{background:var(--surface2)}
#ham-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;display:block}
#ham-wrap{position:relative}
#ham-menu{
  position:absolute;top:calc(100% + 4px);right:0;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,.6);
  display:none;z-index:500;overflow:hidden;
}
#ham-menu.open{display:block}
.ham-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;font-size:14px;cursor:pointer;
  border-bottom:1px solid var(--border);transition:background .1s;
}
.ham-item:last-child{border-bottom:none}
.ham-item:hover{background:var(--surface2)}
.ham-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;color:var(--muted)}

/* ── Main scroll area ── */
#main{
  position:fixed;top:var(--top);bottom:env(safe-area-inset-bottom,0);
  left:0;right:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
}

/* ── FAB ── */
#fab{
  position:fixed;bottom:calc(env(safe-area-inset-bottom,0) + 16px);right:16px;
  width:50px;height:50px;border-radius:50%;background:var(--accent);color:#fff;border:none;
  font-size:26px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(107,156,232,.45);z-index:99;transition:transform .15s;
}
#fab:active{transform:scale(.93)}

/* ── Filter bar ── */
.filter-bar{
  display:flex;align-items:center;gap:7px;padding:7px 12px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:9;background:var(--bg);
  flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar{display:none}
.filter-wrap{position:relative;flex-shrink:0}
.filter-btn{
  display:flex;align-items:center;gap:4px;background:var(--surface2);
  border:1px solid var(--border);border-radius:6px;
  padding:5px 10px;font-size:12px;font-weight:500;color:var(--text);
  cursor:pointer;font-family:inherit;transition:border-color .15s;white-space:nowrap;
}
.filter-btn.active{border-color:var(--accent);color:var(--accent)}
.filter-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.filter-dropdown{
  position:fixed;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);z-index:400;min-width:200px;
  box-shadow:0 8px 24px rgba(0,0,0,.6);
  display:none;overflow:hidden;max-height:60vh;overflow-y:auto;
}
.filter-dropdown.open{display:block}
.fdd-item{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;font-size:13px;cursor:pointer;transition:background .1s;
  border-bottom:1px solid var(--border);
}
.fdd-item:last-child{border-bottom:none}
.fdd-item:hover{background:var(--surface2)}
.fdd-item.on{color:var(--accent);font-weight:600}
.fdd-item .fdd-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.fdd-item .fdd-check{margin-left:auto;color:var(--accent);font-size:14px;font-weight:700}
.filter-clear{
  padding:4px 10px;font-size:11px;font-weight:600;color:var(--accent);
  cursor:pointer;background:none;border:none;font-family:inherit;flex-shrink:0;
}

/* ── Task cards ── */
.card{
  margin:4px 10px;padding:8px 12px;
  background:var(--surface);border-radius:var(--r);
  border:1px solid var(--border);cursor:pointer;transition:border-color .15s;
}
.card:active{border-color:var(--accent)}
.card-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pri-badge{
  font-size:10px;font-weight:700;padding:2px 6px;
  border-radius:4px;color:#fff;flex-shrink:0;text-transform:uppercase;letter-spacing:.4px;
}
.proj-tag{
  font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;flex-shrink:0;
}
.task-name{font-size:14px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-meta{display:flex;align-items:center;margin-top:3px;gap:6px}
.meta-right{display:flex;gap:6px;align-items:center;margin-left:auto;flex-shrink:0}
.due{font-size:12px;color:var(--muted)}
.due.over{color:var(--danger);font-weight:600}
.rec-tag{font-size:11px;color:#9b59b6}
.sub-count{font-size:11px;color:var(--muted)}
.state-tag{font-size:11px;padding:2px 6px;border-radius:4px}
.s-active{background:var(--accent-dim);color:var(--accent)}
.s-completed{background:rgba(46,204,113,.15);color:var(--success)}
.s-archive{background:rgba(136,136,136,.12);color:var(--muted)}

/* ── Section label ── */
.sec{padding:12px 14px 4px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* ── View header (Archive / Search / Projects) ── */
.view-header{
  padding:14px 14px 10px;border-bottom:1px solid var(--border);
  font-size:16px;font-weight:600;background:var(--surface);
  position:sticky;top:0;z-index:10;
}

/* ── Empty state ── */
.empty{text-align:center;color:var(--muted);padding:48px 24px}
.empty-icon{font-size:40px;margin-bottom:8px}
.empty p{font-size:14px}

/* ── Search bar ── */
.search-wrap{padding:10px 12px;position:sticky;top:0;background:var(--bg);z-index:10}
#search-input{
  width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:9px 14px;color:var(--text);font-size:15px;
  outline:none;font-family:inherit;transition:border-color .15s;
}
#search-input:focus{border-color:var(--accent)}

/* ── Projects view ── */
.proj-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);gap:10px}
.proj-swatch{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;cursor:pointer;
  position:relative;overflow:hidden;border:2px solid rgba(255,255,255,.15);
}
.proj-swatch input[type="color"]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:none;padding:0;
}
.proj-code{font-size:13px;font-weight:700;min-width:48px;color:var(--accent)}
.proj-name{flex:1;font-size:14px}
.icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:4px;line-height:1;font-size:16px;transition:color .15s}
.icon-btn:hover{color:var(--danger)}

/* ── Detail panel ── */
#panel{
  position:fixed;top:0;right:0;bottom:0;width:100%;max-width:620px;
  background:var(--bg);z-index:200;
  transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
  border-left:1px solid var(--border);
}
#panel.open{transform:translateX(0)}
.panel-head{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:11px 14px;display:flex;align-items:flex-start;gap:10px;flex-shrink:0;
}
.panel-back{background:none;border:none;color:var(--accent);cursor:pointer;padding:4px;flex-shrink:0;font-size:20px;line-height:1;margin-top:1px}
.panel-info{flex:1;min-width:0}
.panel-info h2{font-size:16px;font-weight:600;word-break:break-word}
.panel-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.meta-pill{
  display:flex;align-items:center;gap:4px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:4px 9px;font-size:12px;cursor:pointer;
  transition:border-color .15s;
}
.meta-pill:hover{border-color:var(--accent)}
.meta-pill.over{border-color:rgba(231,76,60,.4);color:var(--danger)}
.meta-pill .lbl{color:var(--muted);font-size:11px}
.meta-pill .val{font-weight:500}
.meta-pill svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;color:var(--muted)}
.panel-actions{
  display:flex;gap:6px;padding:8px 12px;
  background:var(--surface);border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;flex-wrap:wrap;
}
.panel-actions::-webkit-scrollbar{display:none}
.abtn{
  padding:6px 14px;border-radius:6px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:13px;
  cursor:pointer;white-space:nowrap;transition:opacity .15s;font-family:inherit;flex-shrink:0;
}
.abtn:active{opacity:.75}
.abtn.pri{background:var(--accent);color:#fff;border-color:var(--accent)}
.abtn.dng{background:rgba(231,76,60,.12);color:var(--danger);border-color:rgba(231,76,60,.25)}
.abtn.wrn{background:rgba(240,165,0,.12);color:var(--warning);border-color:rgba(240,165,0,.25)}
.abtn.suc{background:rgba(46,204,113,.12);color:var(--success);border-color:rgba(46,204,113,.25)}
#panel-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.psec{border-bottom:1px solid var(--border)}
.psec-head{
  display:flex;align-items:center;padding:10px 14px;
  font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;
}
.psec-head .psec-title{flex:1}
.psec-head .psec-act{
  background:none;border:none;color:var(--accent);font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;padding:2px 6px;border-radius:4px;
  border:1px solid transparent;transition:border-color .15s;
}
.psec-head .psec-act:hover{border-color:var(--accent)}
.psec-body{padding:0 14px 14px}
.md h1{font-size:15px;font-weight:600;margin:0 0 8px}
.md h2{font-size:14px;font-weight:600;margin:10px 0 5px}
.md h3{font-size:13px;font-weight:600;margin:8px 0 3px;color:var(--muted)}
.md p{margin-bottom:7px;font-size:14px;line-height:1.6;color:var(--text)}
.md ul{padding-left:18px;margin-bottom:7px}
.md li{font-size:14px;line-height:1.6;margin-bottom:2px}
.md code{background:var(--surface2);padding:1px 5px;border-radius:3px;font-size:13px}
.md pre{background:var(--surface2);padding:10px;border-radius:6px;overflow-x:auto;font-size:13px;margin-bottom:8px}
.md em{font-style:italic;color:var(--muted)}
.md strong{font-weight:600}
.md a{color:var(--accent);text-decoration:none}
.md a:hover{text-decoration:underline}
.md hr{border:none;border-top:1px solid var(--border);margin:10px 0}
.md-empty{font-size:14px;color:var(--muted);font-style:italic}
.sub-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.sub-item:last-child{border-bottom:none}
.sub-check{
  width:20px;height:20px;border-radius:50%;flex-shrink:0;
  border:2px solid var(--border);background:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.sub-check:hover{border-color:var(--accent)}
.sub-check.done{background:var(--success);border-color:var(--success)}
.sub-check.done::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.sub-name{font-size:14px;flex:1}
.sub-name.done{text-decoration:line-through;color:var(--muted)}
.sub-rename{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:3px 5px;border-radius:4px;opacity:0;transition:opacity .15s;line-height:1}
.sub-item:hover .sub-rename{opacity:1}
.wlog-entry{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.wlog-entry:last-child{border-bottom:none;margin-bottom:0}
.wlog-ts{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.wlog-text{font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.log-details{width:100%}
.log-details summary{
  padding:10px 14px;font-size:12px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.4px;cursor:pointer;
  list-style:none;display:flex;align-items:center;gap:6px;
}
.log-details summary::-webkit-details-marker{display:none}
.log-details summary::before{content:'›';font-size:16px;transition:transform .15s;display:inline-block}
.log-details[open] summary::before{transform:rotate(90deg)}
.log-inner{padding:0 14px 14px}
.log-entry{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.log-entry:last-child{border-bottom:none}
.log-ts{color:var(--muted);font-size:11px;white-space:nowrap;min-width:108px;padding-top:1px}
.log-body{flex:1}
.log-action{font-weight:500}
.log-extras{color:var(--muted);font-size:11px;margin-top:1px}
.over-banner{
  background:rgba(231,76,60,.1);color:var(--danger);
  border:1px solid rgba(231,76,60,.25);border-radius:var(--r);
  padding:7px 11px;font-size:13px;margin:0 14px 10px;
}

/* ── Bottom sheet ── */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;opacity:0;pointer-events:none;transition:opacity .2s}
#overlay.open{opacity:1;pointer-events:all}
#sheet{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-radius:16px 16px 0 0;z-index:301;
  padding-bottom:env(safe-area-inset-bottom);
  transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  max-height:88vh;display:flex;flex-direction:column;
}
#sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.sheet-title{padding:10px 16px 6px;font-size:16px;font-weight:600;flex-shrink:0}
.sheet-body{padding:6px 16px 16px;overflow-y:auto;flex:1}

/* Forms */
.fg{margin-bottom:13px}
.fg label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg textarea,.fg select{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r);padding:9px 11px;color:var(--text);
  font-size:15px;font-family:inherit;outline:none;transition:border-color .15s;
  -webkit-appearance:none;appearance:none;
}
.fg input[type="color"]{
  height:42px;padding:4px 8px;cursor:pointer;
}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--accent)}
.fg textarea{min-height:90px;resize:vertical}
.fg select option{background:var(--surface2)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.btn-row{display:flex;gap:10px;margin-top:6px}
.pri-quick{display:flex;gap:8px;margin-bottom:13px}
.pq-btn{flex:1;padding:9px 6px;border:none;border-radius:var(--r);color:#fff;font-size:13px;font-weight:700;cursor:pointer;opacity:.9;transition:opacity .15s;font-family:inherit}
.pq-btn:active{opacity:1}
.pri-quick-sm{display:flex;gap:6px}
.pq-btn-sm{flex:1;padding:5px 4px;border:none;border-radius:4px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;opacity:.9;transition:opacity .15s;font-family:inherit}
.pq-btn-sm:active{opacity:1}
.btn{flex:1;padding:12px;border-radius:var(--r);border:none;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s;font-family:inherit}
.btn:active{opacity:.8}
.btn-p{background:var(--accent);color:#fff}
.btn-s{background:var(--surface3);color:var(--text)}
.btn-d{background:var(--danger);color:#fff}

/* Toast */
#toast{
  position:fixed;bottom:calc(env(safe-area-inset-bottom,0) + 16px);
  left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--surface3);color:var(--text);
  padding:9px 20px;border-radius:18px;font-size:14px;z-index:500;
  opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Chat view */
#chat-view{display:flex;flex-direction:column;height:100%}
#chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:10px 14px;border-radius:var(--r);font-size:14px;line-height:1.5;word-break:break-word}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:2px}
.msg.assistant{align-self:flex-start;background:var(--surface2);color:var(--text);border-bottom-left-radius:2px}

/* Typing indicator */
.typing{display:flex;gap:4px;padding:10px 14px;background:var(--surface2);border-radius:var(--r);align-self:flex-start;margin-bottom:12px}
.dot{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.4s infinite ease-in-out both}
.dot:nth-child(1){animation-delay:-0.32s}
.dot:nth-child(2){animation-delay:-0.16s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

#chat-input-wrap{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--surface)}
#chat-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:8px 16px;color:var(--text);font-size:15px;outline:none;font-family:inherit}
#chat-send{background:var(--accent);color:#fff;border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
#chat-send:disabled{opacity:.5;cursor:not-allowed}
#chat-send svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}

/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<div id="topbar">
  <button class="back-btn" id="back-btn" onclick="App.goHome()" style="display:none">‹</button>
  <h1 class="brand">TOleDO</h1>
  <div id="ham-wrap">
    <button id="ham-btn" onclick="App.toggleHamMenu(event)" title="Menu">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <button id="chat-btn" onclick="App.setView('chat')" title="Chat" style="background:none;border:none;color:var(--text);cursor:pointer;padding:7px;border-radius:6px;flex-shrink:0;transition:background .15s">
      <svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;display:block"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
    <div id="ham-menu">
      <div class="ham-item" onclick="App.setView('search')">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        Search
      </div>
      <div class="ham-item" onclick="App.setView('projects')">
        <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
        Edit Projects
      </div>
      <div class="ham-item" onclick="App.setView('archive')">
        <svg viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
        Archive
      </div>
    </div>
  </div>
</div>

<div id="main"></div>

<button id="fab" onclick="App.openSheet('new-task')" title="New task">+</button>

<!-- Detail panel -->
<div id="panel">
  <div class="panel-head">
    <button class="panel-back" onclick="App.closePanel()">‹</button>
    <div class="panel-info" id="panel-info"></div>
  </div>
  <div class="panel-actions" id="panel-actions"></div>
  <div id="panel-body"></div>
</div>

<!-- Sheet overlay -->
<div id="overlay" onclick="App.closeSheet()"></div>
<div id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheet-title"></div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<div id="toast"></div>

<script>
const $ = id => document.getElementById(id);

// ── Priority helpers ──────────────────────────────────────────────────────────
function priLabel(n) {
  n = parseInt(n);
  if (n <= 24)  return 'Ultra High';
  if (n === 25) return 'High';
  if (n <= 49)  return 'Med-High';
  if (n === 50) return 'Medium';
  if (n <= 74)  return 'Med-Low';
  if (n === 75) return 'Low';
  return 'Very Low';
}
function priColor(n) {
  n = parseInt(n);
  if (n <= 24)  return '#c0392b';
  if (n === 25) return '#e74c3c';
  if (n <= 49)  return '#e67e22';
  if (n === 50) return '#f0a500';
  if (n <= 74)  return '#2980b9';
  if (n === 75) return '#27ae60';
  return '#555';
}

// ── Hex color helpers ─────────────────────────────────────────────────────────
function hexToRgba(hex, alpha) {
  hex = hex || '#6b9ce8';
  const r = parseInt(hex.slice(1,3), 16) || 107;
  const g = parseInt(hex.slice(3,5), 16) || 156;
  const b = parseInt(hex.slice(5,7), 16) || 232;
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── App state ─────────────────────────────────────────────────────────────────
const App = {
  view: 'tasks',   // 'tasks' | 'search' | 'projects' | 'archive'
  tasks: [],
  projects: {},
  // State filter — multi-select, default active only
  stateFilters: new Set(['active']),
  // Client-side filters
  projFilters: new Set(),
  dueFilter:   'any',       // 'any' | 'overdue' | 'today' | '7' | '14' | '30'
  priFilter:   'any',       // 'any' | 'high' | 'medium' | 'low'
  // Detail panel
  task: null,
  // Search
  query: '',
  results: [],
  // Chat
  chatMessages: [],
};

// ── API ───────────────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.body = JSON.stringify(body); opts.headers['Content-Type'] = 'application/json'; }
  const r = await fetch(path, opts);
  if (!r.ok) {
    const e = await r.json().catch(() => ({ error: r.statusText }));
    throw new Error(e.error || r.statusText);
  }
  return r.json();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
App.toast = function(msg, duration = 2400) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(App._tt);
  App._tt = setTimeout(() => el.classList.remove('show'), duration);
};

// ── Init ──────────────────────────────────────────────────────────────────────
App.init = async function() {
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  await Promise.all([App.loadTasks(), App.loadProjects()]);
  App.renderMain();
};

App.loadTasks = async function() {
  try {
    // Archive is a separate view; tasks view always loads active+completed (filtered client-side)
    const params = App.view === 'archive' ? ['state=archive'] : [];
    App.tasks = await api('GET', '/api/tasks' + (params.length ? '?' + params.join('&') : ''));
  } catch(e) { App.toast('✗ ' + e.message); }
};

App.loadProjects = async function() {
  try { App.projects = await api('GET', '/api/projects'); } catch {}
};

// ── Client-side filtering ─────────────────────────────────────────────────────
App.filteredTasks = function() {
  let tasks = App.tasks;

  // State filter (empty set = show all)
  if (App.stateFilters.size > 0) {
    tasks = tasks.filter(t => App.stateFilters.has(t.state));
  }

  if (App.projFilters.size > 0) {
    tasks = tasks.filter(t => App.projFilters.has(t.project));
  }

  if (App.dueFilter !== 'any') {
    const today = new Date(); today.setHours(0,0,0,0);
    tasks = tasks.filter(t => {
      if (App.dueFilter === 'overdue') return t.overdue;
      if (!t.due) return false;
      const d = new Date(t.due + 'T00:00:00');
      if (App.dueFilter === 'today') return d <= today;
      const cutoff = new Date(today);
      cutoff.setDate(cutoff.getDate() + parseInt(App.dueFilter));
      return d <= cutoff;
    });
  }

  if (App.priFilter !== 'any') {
    tasks = tasks.filter(t => {
      const p = parseInt(t.priority);
      if (App.priFilter === 'high')   return p <= 49;
      if (App.priFilter === 'medium') return p === 50;
      if (App.priFilter === 'low')    return p >= 51;
      return true;
    });
  }

  return tasks;
};

// ── Views ─────────────────────────────────────────────────────────────────────
App.setView = function(v) {
  // Close menus
  document.querySelectorAll('.filter-dropdown,#ham-menu').forEach(d => d.classList.remove('open'));
  App.view = v;
  App.loadTasks().then(() => App.renderMain());
};

App.goHome = function() {
  App.view = 'tasks';
  App.loadTasks().then(() => App.renderMain());
};

App.renderMain = function() {
  const el = $('main');
  const fab = $('fab');
  const back = $('back-btn');
  switch (App.view) {
    case 'tasks':
      el.innerHTML = App.buildTasksView();
      fab.style.display = 'flex';
      back.style.display = 'none';
      break;
    case 'archive':
      el.innerHTML = App.buildArchiveView();
      fab.style.display = 'none';
      back.style.display = 'block';
      break;
    case 'search':
      el.innerHTML = App.buildSearchView();
      fab.style.display = 'none';
      back.style.display = 'block';
      setTimeout(() => { const i = $('search-input'); if (i) i.focus(); }, 100);
      break;
    case 'projects':
      el.innerHTML = App.buildProjectsView();
      fab.style.display = 'none';
      back.style.display = 'block';
      break;
    case 'chat':
      el.innerHTML = App.buildChatView();
      fab.style.display = 'none';
      back.style.display = 'block';
      App.scrollChat();
      setTimeout(() => { const i = $('chat-input'); if (i) i.focus(); }, 100);
      break;
  }
};

// ── Chat view ─────────────────────────────────────────────────────────────────
App.buildChatView = function() {
  const msgs = App.chatMessages.length ? App.chatMessages : [{role:'assistant', content:'Hello! I can help you with your tasks. What’s on your mind?'}];
  let html = `<div id="chat-view"><div id="chat-msgs">`;
  msgs.forEach(m => {
    if (m.role === 'tool' || m.tool_calls) return; // Hide internal tool messages
    html += `<div class="msg ${m.role}">${mdToHtml(m.content || '')}</div>`;
  });
  if (App.isChatLoading) {
    html += `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  }
  html += `</div><div id="chat-input-wrap">
    <input id="chat-input" placeholder="Ask Toledo…" onkeydown="if(event.key==='Enter') App.sendChatMessage()">
    <button id="chat-send" onclick="App.sendChatMessage()">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div></div>`;
  return html;
};

App.scrollChat = function() {
  const m = $('chat-msgs');
  if (m) m.scrollTop = m.scrollHeight;
};

App.sendChatMessage = async function() {
  const inp = $('chat-input');
  const btn = $('chat-send');
  const text = inp.value.trim();
  if (!text || App.isChatLoading) return;

  inp.value = '';
  inp.disabled = true;
  btn.disabled = true;

  App.chatMessages.push({ role: 'user', content: text });
  App.isChatLoading = true;
  App.renderMain();

  try {
    const res = await api('POST', '/api/chat', { messages: App.chatMessages });
    App.chatMessages = res.history || App.chatMessages; // Update with history from server
  } catch(e) {
    App.chatMessages.push({ role: 'assistant', content: 'Error: ' + e.message });
  }

  App.isChatLoading = false;
  inp.disabled = false;
  btn.disabled = false;
  App.renderMain();
};

// ── Tasks view ────────────────────────────────────────────────────────────────
App.buildTasksView = function() {
  const filterBar = App.buildFilterBar();
  const tasks = App.filteredTasks();
  // Show state badge/section header when completed tasks may be visible
  const showState = App.stateFilters.size !== 1 || App.stateFilters.has('completed');

  if (!tasks.length) {
    return filterBar + App.activeFiltersInfo() +
      `<div class="empty"><div class="empty-icon">📋</div><p>No tasks</p></div>`;
  }

  const order = ['active', 'completed'];
  const groups = {};
  tasks.forEach(t => { (groups[t.state] = groups[t.state] || []).push(t); });

  let html = filterBar + App.activeFiltersInfo();
  order.forEach(s => {
    if (!groups[s]) return;
    if (showState) html += `<div class="sec">${s.charAt(0).toUpperCase() + s.slice(1)}</div>`;
    groups[s].forEach(t => { html += App.buildCard(t, false); });
  });
  return html;
};

// ── Archive view ──────────────────────────────────────────────────────────────
App.buildArchiveView = function() {
  const tasks = App.filteredTasks();
  const filterBar = App.buildFilterBar();
  if (!tasks.length) {
    return `<div class="view-header">Archive</div>` + filterBar +
      `<div class="empty"><div class="empty-icon">📦</div><p>Archive is empty</p></div>`;
  }
  let html = `<div class="view-header">Archive</div>` + filterBar;
  tasks.forEach(t => { html += App.buildCard(t, false); });
  return html;
};

// ── Filter bar ────────────────────────────────────────────────────────────────
App.buildFilterBar = function() {
  const codes = Object.keys(App.projects).sort();
  const sf = App.stateFilters;
  const hasStateFilter = !(sf.size === 1 && sf.has('active'));  // non-default
  const hasProjFilter  = App.projFilters.size > 0;
  const hasDueFilter   = App.dueFilter !== 'any';
  const hasPriFilter   = App.priFilter !== 'any';

  // Status dropdown (multi-select)
  const stateOpts = ['active', 'completed'];
  const stateLabel = sf.size === 0 ? 'All'
    : sf.size === 2 ? 'Active + Completed'
    : sf.has('active') ? 'Active' : 'Completed';
  let stateDd = stateOpts.map(s => {
    const on = sf.has(s);
    const check = on ? '<span class="fdd-check">✓</span>' : '';
    return `<div class="fdd-item${on ? ' on' : ''}" onclick='App.toggleStateFilter(${JSON.stringify(s)})'>${s.charAt(0).toUpperCase()+s.slice(1)}${check}</div>`;
  }).join('');

  // Project dropdown
  const projLabel = hasProjFilter
    ? (App.projFilters.size === 1 ? projName([...App.projFilters][0]) : `${App.projFilters.size} projects`)
    : 'Projects';
  let projDd = `<div class="fdd-item${!hasProjFilter ? ' on' : ''}" onclick="App.clearProjFilters()">All Projects</div>`;
  codes.forEach(code => {
    const on = App.projFilters.has(code);
    const dot = `<span class="fdd-dot" style="background:${projColor(code)}"></span>`;
    const check = on ? '<span class="fdd-check">✓</span>' : '';
    projDd += `<div class="fdd-item${on ? ' on' : ''}" onclick='App.toggleProjFilter(${JSON.stringify(code)})'>${dot}${esc(projName(code))}${check}</div>`;
  });

  // Due date dropdown
  const dueLabelMap = {any:'Any Date',overdue:'Overdue',today:'Today','7':'Next 7 Days','14':'Next 14 Days','30':'Next 30 Days'};
  const dueLabel = dueLabelMap[App.dueFilter] || 'Any Date';
  let dueDd = Object.entries(dueLabelMap).map(([v,l]) =>
    `<div class="fdd-item${App.dueFilter === v ? ' on' : ''}" onclick='App.setDueFilter(${JSON.stringify(v)})'>${l}</div>`
  ).join('');

  // Priority dropdown
  const priLabelMap = {any:'Any Priority',high:'High (0–49)',medium:'Medium (50)',low:'Low (51–99)'};
  const priLabelText = priLabelMap[App.priFilter] || 'Any Priority';
  let priDd = Object.entries(priLabelMap).map(([v,l]) =>
    `<div class="fdd-item${App.priFilter === v ? ' on' : ''}" onclick='App.setPriFilter(${JSON.stringify(v)})'>${l}</div>`
  ).join('');

  const chevron = `<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`;

  let html = `<div class="filter-bar">
    <div class="filter-wrap">
      <button class="filter-btn${hasStateFilter ? ' active' : ''}" onclick="App.toggleDropdown('state-dd',event)">
        ${esc(stateLabel)} ${chevron}
      </button>
      <div class="filter-dropdown" id="state-dd">${stateDd}</div>
    </div>
    <div class="filter-wrap">
      <button class="filter-btn${hasProjFilter ? ' active' : ''}" onclick="App.toggleDropdown('proj-dd',event)">
        ${esc(projLabel)} ${chevron}
      </button>
      <div class="filter-dropdown" id="proj-dd">${projDd}</div>
    </div>
    <div class="filter-wrap">
      <button class="filter-btn${hasDueFilter ? ' active' : ''}" onclick="App.toggleDropdown('due-dd',event)">
        ${esc(dueLabel)} ${chevron}
      </button>
      <div class="filter-dropdown" id="due-dd">${dueDd}</div>
    </div>
    <div class="filter-wrap">
      <button class="filter-btn${hasPriFilter ? ' active' : ''}" onclick="App.toggleDropdown('pri-dd',event)">
        ${esc(priLabelText)} ${chevron}
      </button>
      <div class="filter-dropdown" id="pri-dd">${priDd}</div>
    </div>`;

  if (hasStateFilter || hasProjFilter || hasDueFilter || hasPriFilter) {
    html += `<button class="filter-clear" onclick="App.clearAllFilters()">Clear</button>`;
  }
  return html + '</div>';
};

App.activeFiltersInfo = function() {
  const shown = App.filteredTasks().length;
  const hasProjFilter = App.projFilters.size > 0;
  const hasDueFilter  = App.dueFilter !== 'any';
  const hasPriFilter  = App.priFilter !== 'any';
  if (!hasProjFilter && !hasDueFilter && !hasPriFilter) return '';
  return `<div style="padding:4px 14px;font-size:11px;color:var(--muted)">${shown} task${shown !== 1 ? 's' : ''} shown</div>`;
};

App.toggleDropdown = function(id, e) {
  if (e) e.stopPropagation();
  const dd = $(id);
  if (!dd) return;
  const wasOpen = dd.classList.contains('open');
  document.querySelectorAll('.filter-dropdown,#ham-menu').forEach(d => d.classList.remove('open'));
  if (!wasOpen) {
    // Position fixed relative to the trigger button
    const btn = e && e.target ? e.target.closest('.filter-btn') : null;
    if (btn) {
      const r = btn.getBoundingClientRect();
      dd.style.top  = (r.bottom + 4) + 'px';
      dd.style.left = r.left + 'px';
    }
    dd.classList.add('open');
  }
};

App.toggleHamMenu = function(e) {
  if (e) e.stopPropagation();
  const menu = $('ham-menu');
  const wasOpen = menu.classList.contains('open');
  document.querySelectorAll('.filter-dropdown,#ham-menu').forEach(d => d.classList.remove('open'));
  if (!wasOpen) menu.classList.add('open');
};

document.addEventListener('click', () => {
  document.querySelectorAll('.filter-dropdown,#ham-menu').forEach(d => d.classList.remove('open'));
});

App.toggleStateFilter = function(s) {
  if (App.stateFilters.has(s)) App.stateFilters.delete(s);
  else App.stateFilters.add(s);
  App.renderMain();
  setTimeout(() => { const dd = $('state-dd'); if (dd) dd.classList.add('open'); }, 0);
};

App.toggleProjFilter = function(code) {
  if (App.projFilters.has(code)) App.projFilters.delete(code);
  else App.projFilters.add(code);
  App.renderMain();
  // Re-open dropdown
  setTimeout(() => { const dd = $('proj-dd'); if (dd) dd.classList.add('open'); }, 0);
};

App.clearProjFilters = function() {
  App.projFilters.clear();
  App.renderMain();
};

App.setDueFilter = function(v) {
  App.dueFilter = v;
  App.renderMain();
};

App.setPriFilter = function(v) {
  App.priFilter = v;
  App.renderMain();
};

App.clearAllFilters = function() {
  App.stateFilters = new Set(['active']);
  App.projFilters.clear();
  App.dueFilter = 'any';
  App.priFilter = 'any';
  App.renderMain();
};

// ── Task card ─────────────────────────────────────────────────────────────────
App.buildCard = function(t, showState) {
  const dueHtml = t.due
    ? `<span class="due${t.overdue ? ' over' : ''}">${t.overdue ? '⚠ ' : ''}${t.due}</span>`
    : '';
  const recHtml   = t.recurrence ? `<span class="rec-tag">↻ ${t.recurrence}d</span>` : '';
  const stateHtml = showState ? `<span class="state-tag s-${t.state}">${t.state}</span>` : '';
  const totalSubs = t.subtasks.active.length + t.subtasks.completed.length;
  const subHtml   = totalSubs > 0
    ? `<span class="sub-count">${t.subtasks.completed.length}/${totalSubs} subtasks</span>` : '';

  const pl = priLabel(t.priority), pc = priColor(t.priority);
  const pColor = projColor(t.project);
  const pBg = hexToRgba(pColor, 0.15);

  return `<div class="card" onclick='App.openTask(${JSON.stringify(t.slug)})'>
    <div class="card-top">
      <span class="pri-badge" style="background:${pc}">${pl}</span>
      <span class="proj-tag" style="background:${pBg};color:${pColor}">${esc(projName(t.project))}</span>
      <span class="task-name">${esc(t.name)}</span>
    </div>
    <div class="card-meta">${recHtml}${stateHtml}<span class="meta-right">${subHtml}${dueHtml}</span></div>
  </div>`;
};

// ── Search view ───────────────────────────────────────────────────────────────
App.buildSearchView = function() {
  let html = `<div class="search-wrap">
    <input id="search-input" type="search" placeholder="Search tasks…"
      value="${esc(App.query)}" oninput="App.onSearch(this.value)" autocomplete="off">
  </div>`;
  if (!App.query) {
    return html + `<div class="empty"><div class="empty-icon">🔍</div><p>Search names, descriptions, and notes</p></div>`;
  }
  if (!App.results.length) {
    return html + `<div class="empty"><p>No results for "${esc(App.query)}"</p></div>`;
  }
  App.results.forEach(t => { html += App.buildCard(t, true); });
  return html;
};

App.onSearch = async function(q) {
  App.query = q;
  if (!q.trim()) { App.results = []; App.renderMain(); return; }
  try { App.results = await api('GET', '/api/search?q=' + encodeURIComponent(q)); } catch {}
  App.renderMain();
  const inp = $('search-input');
  if (inp) { inp.focus(); inp.setSelectionRange(q.length, q.length); }
};

// ── Projects view ─────────────────────────────────────────────────────────────
App.buildProjectsView = function() {
  let html = `<div class="view-header">Edit Projects</div>
    <div style="padding:8px 10px 4px;display:flex;justify-content:flex-end">
      <button class="abtn pri" onclick="App.openSheet('new-project')">+ Add project</button>
    </div>`;
  const codes = Object.keys(App.projects).sort();
  if (!codes.length) return html + `<div class="empty"><div class="empty-icon">🗂️</div><p>No projects yet</p></div>`;
  html += `<div style="background:var(--surface);border-radius:var(--r);margin:4px 10px 8px;border:1px solid var(--border)">`;
  codes.forEach(code => {
    const pColor = projColor(code);
    const pName = projName(code);
    html += `<div class="proj-row">
      <label class="proj-swatch" style="background:${esc(pColor)}" title="Pick color">
        <input type="color" value="${esc(pColor)}" onchange='App.updateProjectColor(${JSON.stringify(code)}, this.value)'>
      </label>
      <span class="proj-code">${esc(code)}</span>
      <span class="proj-name">${esc(pName)}</span>
      <button class="icon-btn" onclick='App.deleteProject(${JSON.stringify(code)})' title="Remove">✕</button>
    </div>`;
  });
  return html + '</div>';
};

App.updateProjectColor = async function(code, color) {
  try {
    App.projects = await api('PATCH', `/api/projects/${encodeURIComponent(code)}`, { color });
    App.renderMain();
    App.toast(`✓ Color updated`);
  } catch(e) { App.toast('✗ ' + e.message); }
};

App.deleteProject = async function(code) {
  if (!confirm(`Remove project "${code}"?`)) return;
  try {
    await api('DELETE', `/api/projects/${code}`);
    await App.loadProjects();
    App.renderMain();
    App.toast(`Removed ${code}`);
  } catch(e) { App.toast('✗ ' + e.message); }
};

// ── Task detail panel ─────────────────────────────────────────────────────────
App.openTask = async function(slug) {
  try {
    App.task = await api('GET', '/api/tasks/' + encodeURIComponent(slug));
    App.renderPanel();
    $('panel').classList.add('open');
    $('panel-body').scrollTop = 0;
  } catch(e) { App.toast('✗ ' + e.message); }
};

App.closePanel = function() { $('panel').classList.remove('open'); };

App.renderPanel = function() {
  const tk = App.task;
  if (!tk) return;

  const overdue = tk.overdue;
  let metaPills = '';

  // Due date pill
  if (tk.due) {
    metaPills += `<button class="meta-pill${overdue ? ' over' : ''}" onclick="App.openSheet('set-due')" title="Change due date">
      <span class="lbl">Due</span>
      <span class="val">${esc(tk.due)}</span>
      <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    </button>`;
  } else {
    metaPills += `<button class="meta-pill" onclick="App.openSheet('set-due')" title="Set due date">
      <span class="lbl">Due</span><span class="val" style="color:var(--muted)">not set</span>
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>`;
  }

  // Priority pill
  const pLabel = priLabel(tk.priority), pColor = priColor(tk.priority);
  metaPills += `<button class="meta-pill" onclick="App.openSheet('reprioritize')" title="Change priority">
    <span class="lbl">Priority</span>
    <span class="val" style="color:${pColor};font-weight:700">${tk.priority} · ${pLabel}</span>
    <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
  </button>`;

  // Project pill
  const tkProjColor = projColor(tk.project);
  const tkProjBg = hexToRgba(tkProjColor, 0.15);
  metaPills += `<button class="meta-pill" onclick="App.openSheet('change-project')" title="Change project"
    style="border-color:${hexToRgba(tkProjColor,.3)}">
    <span class="lbl">Project</span>
    <span class="val" style="color:${tkProjColor}">${esc(projName(tk.project))}</span>
    <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
  </button>`;

  // State pill
  metaPills += `<span class="meta-pill" style="cursor:default;background:none;border-color:transparent">
    <span class="val state-tag s-${tk.state}">${tk.state}</span>
  </span>`;

  if (tk.recurrence) {
    metaPills += `<span class="meta-pill" style="cursor:default">
      <span class="lbl">Recurs</span>
      <span class="val">every ${tk.recurrence}d</span>
    </span>`;
  }

  $('panel-info').innerHTML = `<h2>${esc(tk.name)}</h2><div class="panel-meta">${metaPills}</div>`;

  // Action buttons
  let actions = '';
  if (tk.state === 'active') {
    actions += `<button class="abtn pri" onclick="App.doAction('done')">✓ Mark Completed</button>`;
    if (tk.recurrence) {
      actions += `<button class="abtn wrn" onclick="App.doAction('cancel')">✕ Cancel Recurrence</button>`;
    }
  } else if (tk.state === 'completed') {
    actions += `<button class="abtn" onclick="App.doAction('archive')">Archive</button>`;
    actions += `<button class="abtn suc" onclick="App.doMove('active')">↩ Make Active</button>`;
  } else if (tk.state === 'archive') {
    actions += `<button class="abtn suc" onclick="App.doMove('active')">↩ Make Active</button>`;
    actions += `<button class="abtn dng" onclick="App.confirmDelete()">🗑 Delete</button>`;
  }
  actions += `<button class="abtn" onclick="App.openSheet('rename-task')">✎ Rename</button>`;
  $('panel-actions').innerHTML = actions;

  // Body sections
  let body = '';

  if (overdue) {
    body += `<div class="over-banner">⚠ Overdue since ${tk.due}</div>`;
  }

  // Description
  const descHtml = renderDesc(tk.description);
  body += `<div class="psec">
    <div class="psec-head">
      <span class="psec-title">Description</span>
      <button class="psec-act" onclick="App.openSheet('edit-desc')">Edit</button>
    </div>
    <div class="psec-body"><div class="md">${descHtml}</div></div>
  </div>`;

  // Subtasks
  const allSubs = [
    ...tk.subtasks.active.map(s => ({ ...s, done: false })),
    ...tk.subtasks.completed.map(s => ({ ...s, done: true })),
  ];
  let subsHtml = allSubs.length === 0
    ? `<p class="md-empty">No subtasks yet.</p>`
    : allSubs.map(s => `<div class="sub-item">
        <button class="sub-check${s.done ? ' done' : ''}"
          onclick='${s.done ? `App.undoSubtask(${JSON.stringify(s.slug)})` : `App.doneSubtask(${JSON.stringify(s.slug)})`}'
          title="${s.done ? 'Mark incomplete' : 'Mark done'}"></button>
        <span class="sub-name${s.done ? ' done' : ''}">${esc(s.name)}</span>
        <button class="sub-rename" onclick='App.openSubRename(${JSON.stringify(s.slug)},${JSON.stringify(s.name)})' title="Rename">✎</button>
      </div>`).join('');
  body += `<div class="psec">
    <div class="psec-head">
      <span class="psec-title">Subtasks</span>
      <button class="psec-act" onclick="App.openSheet('add-subtask')">+ Add</button>
    </div>
    <div class="psec-body">${subsHtml}</div>
  </div>`;

  // Notes
  const raw = (tk.worklog || '').trim();
  let wlogHtml = '';
  if (!raw) {
    wlogHtml = `<p class="md-empty">No notes yet.</p>`;
  } else {
    const entries = raw.split(/\n(?=### )/).filter(Boolean).reverse();
    wlogHtml = entries.map(entry => {
      const m = entry.match(/^### (.+)\n([\s\S]*)$/);
      return m
        ? `<div class="wlog-entry"><div class="wlog-ts">${esc(m[1])}</div><div class="wlog-text">${esc(m[2].trim())}</div></div>`
        : `<div class="wlog-entry"><div class="wlog-text">${esc(entry.trim())}</div></div>`;
    }).join('');
  }
  body += `<div class="psec">
    <div class="psec-head">
      <span class="psec-title">Notes</span>
      <button class="psec-act" onclick="App.openSheet('add-note')">+ Add</button>
    </div>
    <div class="psec-body">${wlogHtml}</div>
  </div>`;

  // Activity log
  let logHtml = '';
  if (tk.log && tk.log.length) {
    logHtml = [...tk.log].reverse().map(e => {
      const { ts, action, ...rest } = e;
      const extras = Object.entries(rest).map(([k, v]) => `${k}=${v}`).join('  ');
      return `<div class="log-entry">
        <div class="log-ts">${ts.replace('T', ' ').slice(0, 16)}</div>
        <div class="log-body">
          <div class="log-action">${esc(action)}</div>
          ${extras ? `<div class="log-extras">${esc(extras)}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  } else {
    logHtml = `<p class="md-empty">No activity yet.</p>`;
  }
  body += `<div class="psec" style="border-bottom:none">
    <details class="log-details">
      <summary>Activity Log</summary>
      <div class="log-inner">${logHtml}</div>
    </details>
  </div>`;

  $('panel-body').innerHTML = body;
};

App.doAction = async function(action) {
  if (!App.task) return;
  try {
    const d = await api('POST', `/api/tasks/${encodeURIComponent(App.task.slug)}/${action}`);
    if (action === 'done' && d.recurring) {
      App.toast(`↻ Next due: ${d.next_due}`);
      App.task = await api('GET', '/api/tasks/' + encodeURIComponent(App.task.slug));
      App.renderPanel();
    } else {
      App.toast(action === 'done' ? '✓ Completed' : action === 'archive' ? 'Archived' : 'Done');
      App.closePanel();
    }
    App.loadTasks().then(() => App.renderMain());
  } catch(e) { App.toast('✗ ' + e.message); }
};

// ── Markdown renderer ─────────────────────────────────────────────────────────
function renderDesc(src) {
  if (!src || !src.trim()) return '<p class="md-empty">No description.</p>';
  const stripped = src.replace(/^#[^\n]*\n+/, '');
  return stripped.trim() ? mdToHtml(stripped) : '<p class="md-empty">No description.</p>';
}

function mdToHtml(src) {
  if (!src) return '';
  const lines = src.split('\n');
  let html = '', inUl = false, inPre = false;
  const flushUl = () => { if (inUl) { html += '</ul>'; inUl = false; } };
  lines.forEach(line => {
    if (line.startsWith('```')) {
      if (inPre) { html += '</pre>'; inPre = false; }
      else { flushUl(); html += '<pre>'; inPre = true; }
      return;
    }
    if (inPre) { html += esc(line) + '\n'; return; }
    if (/^### /.test(line)) { flushUl(); html += `<h3>${inline(line.slice(4))}</h3>`; return; }
    if (/^## /.test(line))  { flushUl(); html += `<h2>${inline(line.slice(3))}</h2>`; return; }
    if (/^# /.test(line))   { flushUl(); html += `<h1>${inline(line.slice(2))}</h1>`; return; }
    if (/^---$/.test(line)) { flushUl(); html += '<hr>'; return; }
    if (/^[-*] /.test(line)) {
      if (!inUl) { html += '<ul>'; inUl = true; }
      html += `<li>${inline(line.slice(2))}</li>`;
      return;
    }
    flushUl();
    if (line.trim() === '') { html += '<br>'; return; }
    html += `<p>${inline(line)}</p>`;
  });
  flushUl();
  return html;
}

function inline(s) {
  return esc(s)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,     '<em>$1</em>')
    .replace(/_(.+?)_/g,       '<em>$1</em>')
    .replace(/`(.+?)`/g,       '<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function projName(code) {
  const p = App.projects[code];
  return (p && p.name) || (typeof p === 'string' ? p : null) || code;
}
function projColor(code) {
  const p = App.projects[code];
  return (p && p.color) || '#6b9ce8';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
App.init();
</script>
